name: TollPass
options:
  bundleIdPrefix: com.shimondeitel.tollpass
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  TollPass:
    type: application
    platform: iOS
    sources:
      - path: TollPass
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tollpass
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: TollPass/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  TollPassTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TollPassTests
      - path: TollPass.storekit
    dependencies:
      - target: TollPass
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tollpass.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  TollPassUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: TollPassUITests
    dependencies:
      - target: TollPass
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tollpass.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  TollPass:
    build:
      targets:
        TollPass: all
        TollPassTests: [test]
        TollPassUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: TollPass.storekit
    test:
      config: Debug
      storeKitConfiguration: TollPass.storekit
      targets:
        - TollPassTests
        - TollPassUITests
    archive:
      config: Release
